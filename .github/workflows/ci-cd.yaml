name: sd-mail-service CI/CD

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sd_mail_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      NODE_ENV: test
      PGHOST: localhost
      PGPORT: '5432'
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: sd_mail_test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run migrate:up
      - run: npm test

  # Build one image and roll all three ECS services (api/worker/scheduler run the
  # same image with different commands). `dev` → staging, `main`/`master` → production.
  # Requires repo/environment vars + an OIDC deploy role (see infra/DEPLOYMENT.md):
  #   vars: AWS_REGION, AWS_ROLE_ARN, ECR_REPOSITORY, ECS_CLUSTER,
  #         ECS_SERVICE_API, ECS_SERVICE_WORKER, ECS_SERVICE_SCHEDULER, HEALTH_URL
  deploy:
    needs: lint-and-test
    if: github.event_name == 'push' && contains(fromJSON('["refs/heads/main","refs/heads/master","refs/heads/dev"]'), github.ref)
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/dev' && 'staging' || 'production' }}
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
          docker build -t "$IMAGE" -t "$REGISTRY/$ECR_REPOSITORY:latest" ./backend
          docker push "$IMAGE"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"

      - name: Roll ECS services (api runs migrations on start; worker/scheduler are migration-free)
        run: |
          SERVICES="${{ vars.ECS_SERVICE_API }} ${{ vars.ECS_SERVICE_WORKER }} ${{ vars.ECS_SERVICE_SCHEDULER }}"
          for SVC in $SERVICES; do
            aws ecs update-service --cluster "$ECS_CLUSTER" --service "$SVC" \
              --force-new-deployment --region "$AWS_REGION" >/dev/null
          done
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services $SERVICES --region "$AWS_REGION"

      - name: Verify api health
        run: |
          code=$(curl -sk -o /dev/null -w '%{http_code}' "${{ vars.HEALTH_URL }}")
          echo "health: $code"
          [ "$code" = "200" ] || { echo "::error::api health check failed ($code)"; exit 1; }
